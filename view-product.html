<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Details - JUST SWAG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="view-product.css">
    <style>
        :root {
            --brand: #1fa533;
            --accent: #32D74B;
            --bg: #050505;
            --surface: #111;
            --text: #f5f5f5;
            --muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: #060606;
            border-top: 4px solid var(--accent);
            border-bottom: 2px solid rgba(50, 215, 75, 0.18);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            background-image: url('./js logo.jpeg');
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            flex-shrink: 0;
        }

        .brand-logo img {
            width: 140px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
        }

        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            padding: 0.5rem;
        }

        .mobile-menu-toggle:hover {
            color: var(--brand);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 2rem;
        }

        nav li {
            margin: 0;
        }

        .nav-link {
            color: var(--brand) !important;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--accent) !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-bottom: 4rem;
        }

        .gallery-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-image {
            width: 100%;
            aspect-ratio: 1;
            background: var(--surface);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 400px;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: opacity 0.4s ease-in-out;
        }

        .main-image img.fade-out {
            opacity: 0;
        }

        .thumbnails {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .thumbnail {
            aspect-ratio: 1;
            background: var(--surface);
            border-radius: 0.75rem;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .thumbnail:hover img {
            transform: scale(1.05);
        }

        .thumbnail.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(50, 215, 75, 0.3);
        }

        .details-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .product-header {
            border-bottom: 1px solid rgba(50, 215, 75, 0.2);
            padding-bottom: 1.5rem;
        }

        .product-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .product-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rating-stars {
            color: var(--accent);
            font-size: 0.9rem;
        }

        .review-count {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            background: rgba(50, 215, 75, 0.05);
            border-radius: 0.75rem;
            border-left: 3px solid var(--accent);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .info-value {
            color: var(--text);
            font-weight: 600;
        }

        .availability-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(31, 165, 51, 0.2);
            border: 1px solid var(--brand);
            color: var(--brand);
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .availability-badge.out-of-stock {
            background: rgba(220, 53, 69, 0.2);
            border-color: #dc3545;
            color: #dc3545;
        }

        .product-description {
            color: var(--muted);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .options-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid rgba(50, 215, 75, 0.1);
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .option-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 0.5rem;
        }

        .option-btn {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(50, 215, 75, 0.3);
            color: var(--text);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .option-btn:hover {
            background: rgba(50, 215, 75, 0.1);
            border-color: var(--accent);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, var(--brand), var(--accent));
            border-color: var(--accent);
            color: #111;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            background: rgba(50, 215, 75, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: var(--brand);
            border-color: var(--brand);
            color: #111;
        }

        .qty-input {
            width: 60px;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(50, 215, 75, 0.3);
            color: var(--text);
            text-align: center;
            border-radius: 0.5rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .qty-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: none;
        }

        .btn-order {
            background: linear-gradient(135deg, var(--brand), var(--accent));
            color: #111;
        }

        .btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(31, 165, 51, 0.3);
        }

        .btn-back {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-back:hover {
            background: rgba(50, 215, 75, 0.1);
        }

        .related-section {
            margin-top: 4rem;
            border-top: 2px solid rgba(50, 215, 75, 0.2);
            padding-top: 3rem;
        }

        .related-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text);
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .related-card {
            border: none;
            border-radius: 1.25rem;
            background: var(--surface);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .related-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 55px rgba(31, 165, 51, 0.15);
        }

        .related-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(31, 165, 51, 0.1), rgba(50, 215, 75, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .related-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .related-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .related-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .related-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: auto;
        }

        .related-btn {
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .related-btn-view {
            background: rgba(50, 215, 75, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .related-btn-view:hover {
            background: var(--accent);
            color: #111;
        }

        .related-btn-order {
            background: linear-gradient(135deg, var(--brand), var(--accent));
            color: #111;
        }

        .related-btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(31, 165, 51, 0.3);
        }

        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 2000;
        }

        @media (max-width: 991px) {
            .product-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .product-title {
                font-size: 1.5rem;
            }

            .price {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            main {
                padding: 1rem;
            }

            .product-container {
                gap: 1.5rem;
            }

            .gallery-section {
                gap: 0.75rem;
            }

            .main-image {
                min-height: 300px;
            }

            .thumbnails {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .mobile-menu-toggle {
                display: block;
            }

            .navbar {
                flex-wrap: wrap;
            }

            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #0a0a0a;
                border-bottom: 1px solid rgba(50, 215, 75, 0.1);
                padding: 1rem;
                flex-direction: column;
                gap: 0;
                width: 100%;
                z-index: 999;
            }

            nav.active {
                display: flex;
            }

            nav ul {
                flex-direction: column;
                gap: 0;
                width: 100%;
            }

            nav li {
                border-bottom: 1px solid rgba(50, 215, 75, 0.1);
                padding: 0.75rem 0;
            }

            nav li:last-child {
                border-bottom: none;
            }

            .nav-link {
                font-size: 1rem;
                padding: 0.5rem 0;
            }

            .brand-logo img {
                width: 110px;
                height: 55px;
            }

            .related-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .navbar {
                padding: 0.75rem 1rem;
            }

            .brand-logo img {
                width: 100px;
                height: 50px;
            }

            main {
                padding: 0.75rem;
            }

            .product-title {
                font-size: 1.25rem;
            }

            .price {
                font-size: 1.25rem;
            }

            .thumbnails {
                grid-template-columns: repeat(2, 1fr);
            }

            .option-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .btn {
                padding: 0.8rem;
                font-size: 0.9rem;
            }

            .related-section {
                margin-top: 2rem;
                padding-top: 2rem;
            }

            .related-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar">
            <a href="index.html" class="brand-logo">
                <img src="./js logo.jpeg" alt="JUST SWAG Logo">
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
            <nav id="navMenu">
                <ul class="nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="collection.html">Collection</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Order</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Product Details Container -->
        <div class="product-container" id="productContainer">
            <!-- Gallery will be loaded here -->
        </div>

        <!-- Related Products Section -->
        <section class="related-section">
            <h2 class="related-title">You may also like</h2>
            <div class="related-grid" id="relatedProducts">
                <!-- Related products will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Toast Container for Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="products.js"></script>
    <script src="view-product.js"></script>

    <script>
        // Mobile menu toggle functionality
        document.getElementById('mobileMenuToggle').addEventListener('click', function () {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('active');
        });

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function () {
                document.getElementById('navMenu').classList.remove('active');
            });
        });

        document.addEventListener('click', function (event) {
            const navMenu = document.getElementById('navMenu');
            const toggle = document.getElementById('mobileMenuToggle');
            if (!navMenu.contains(event.target) && !toggle.contains(event.target)) {
                navMenu.classList.remove('active');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
