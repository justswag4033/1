<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order - JUST SWAG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #1fa533;
            --accent: #32D74B;
            --bg: #050505;
            --surface: #111;
            --text: #f5f5f5;
            --muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: #060606;
            border-top: 4px solid var(--accent);
            border-bottom: 2px solid rgba(50, 215, 75, 0.18);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            background-image: url('./js logo.jpeg');
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            flex-shrink: 0;
        }

        .brand-logo img {
            width: 140px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
        }

        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            padding: 0.5rem;
        }

        .mobile-menu-toggle:hover {
            color: var(--brand);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 2rem;
        }

        nav li {
            margin: 0;
        }

        .nav-link {
            color: var(--brand) !important;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--accent) !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .order-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.45rem;
            min-width: 22px;
            height: 22px;
            padding: 0 0.4rem;
            border-radius: 999px;
            background: var(--accent);
            color: #111;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .remove-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--muted);
            padding: 0.55rem 0.9rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .remove-btn:hover {
            background: rgba(220, 53, 69, 0.15);
            color: #fff;
            border-color: rgba(220, 53, 69, 0.35);
        }

        .empty-cart {
            color: var(--muted);
            padding: 1.5rem 0;
            font-size: 1rem;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h2 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .page-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .cart-section h3 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .cart-item {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 1rem;
            align-items: center;
        }

        .item-image {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(31, 165, 51, 0.1), rgba(50, 215, 75, 0.1));
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .item-details h6 {
            margin: 0 0 0.25rem;
            font-weight: 600;
            font-size: 1rem;
        }

        .item-details small {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .item-price {
            font-weight: 600;
            min-width: 80px;
            text-align: right;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 120px;
        }

        .qty-btn {
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--text);
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 0.4rem;
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background: var(--brand);
            border-color: var(--brand);
            color: #111;
        }

        .qty-input {
            width: 50px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--text);
            text-align: center;
            padding: 0.5rem;
            border-radius: 0.4rem;
        }

        .continue-shopping {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .continue-shopping:hover {
            color: var(--accent);
        }

        .summary-card {
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 100px;
        }

        .summary-card h5 {
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .summary-row.total {
            border-top: 1px solid rgba(50, 215, 75, 0.2);
            padding-top: 0.75rem;
            margin-top: 0.75rem;
            font-weight: 700;
        }

        .summary-row.total span:last-child {
            color: var(--accent);
            font-size: 1.2rem;
        }

        .form-section {
            margin-top: 1.5rem;
        }

        .form-section h6 {
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(50, 215, 75, 0.3);
            border-radius: 0.5rem;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(50, 215, 75, 0.1);
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            color: #111;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(31, 165, 51, 0.3);
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }

            .navbar {
                flex-wrap: wrap;
            }

            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #0a0a0a;
                border-bottom: 1px solid rgba(50, 215, 75, 0.1);
                padding: 1rem;
                flex-direction: column;
                gap: 0;
                width: 100%;
                z-index: 999;
            }

            nav.active {
                display: flex;
            }

            nav ul {
                flex-direction: column;
                gap: 0;
                width: 100%;
            }

            nav li {
                border-bottom: 1px solid rgba(50, 215, 75, 0.1);
                padding: 0.75rem 0;
            }

            nav li:last-child {
                border-bottom: none;
            }

            .nav-link {
                font-size: 1rem;
                padding: 0.5rem 0;
            }

            .brand-logo img {
                width: 110px;
                height: 55px;
            }

            main {
                padding: 1.5rem 1rem;
            }

            h2 {
                font-size: clamp(1.3rem, 3vw, 2rem);
            }

            .page-layout {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .summary-card {
                position: static;
                order: -1;
            }

            .cart-item {
                grid-template-columns: auto 1fr;
                gap: 1rem;
            }

            .item-price,
            .qty-control {
                grid-column: 2;
            }

            .qty-control {
                margin-top: 0.5rem;
            }

            .item-image {
                width: 80px;
                height: 80px;
                grid-row: span 2;
            }
        }

        @media (max-width: 576px) {
            .navbar {
                padding: 0.75rem 1rem;
            }

            .brand-logo img {
                width: 100px;
                height: 50px;
            }

            main {
                padding: 1rem;
            }

            h2 {
                font-size: clamp(1.2rem, 2.5vw, 1.5rem);
                margin-bottom: 1rem;
            }

            .cart-item {
                padding: 1rem;
                margin-bottom: 0.75rem;
                gap: 0.75rem;
            }

            .item-image {
                width: 70px;
                height: 70px;
                font-size: 0.75rem;
            }

            .item-details h6 {
                font-size: 0.9rem;
            }

            .item-details small {
                font-size: 0.75rem;
            }

            .item-price {
                font-size: 0.9rem;
                min-width: 70px;
            }

            .qty-control {
                min-width: 100px;
                font-size: 0.85rem;
            }

            .qty-btn {
                width: 28px;
                height: 28px;
                font-size: 0.9rem;
            }

            .qty-input {
                width: 40px;
                font-size: 0.8rem;
            }

            .summary-card {
                padding: 1.25rem;
            }

            .summary-card h5 {
                font-size: 1rem;
            }

            .summary-row {
                font-size: 0.85rem;
            }

            .summary-row.total span:last-child {
                font-size: 1rem;
            }

            .form-group input {
                padding: 0.65rem;
                font-size: 0.9rem;
            }

            .checkout-btn {
                padding: 0.85rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar">
            <a href="index.html" class="brand-logo">
                <img src="./js logo.jpeg" alt="JUST SWAG Logo">
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
            <nav id="navMenu">
                <ul class="nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="collection.html">Collection</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Order<span class="order-badge d-none"
                                id="orderBadge">0</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2>Shopping Cart</h2>
        <div class="page-layout">
            <div class="cart-section">
                <h3>Items</h3>
                <div id="cartItemsContainer"></div>
                <a href="collection.html" class="continue-shopping">← Continue Shopping</a>
            </div>

            <div class="summary-card">
                <h5>Order Summary</h5>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalAmount">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shippingAmount">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax</span>
                    <span id="taxAmount">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="totalAmount">₦0.00</span>
                </div>

                <div class="form-section">
                    <h6>Delivery Address</h6>

                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" placeholder="City">
                    </div>
                    <div class="form-group">
                        <label for="zip">State</label>
                        <input type="text" id="zip" placeholder="State">
                    </div>
                    <div class="form-group">
                        <label for="addr">Full Address</label>
                        <input type="text" id="addr" placeholder="123 Street Name">
                    </div>
                </div>

                <button class="checkout-btn" id="checkoutBtn" disabled>Proceed to Checkout</button>
                <div class="checkout-status" id="checkoutStatus"
                    style="margin-top:0.75rem; color:var(--muted); font-size:0.9rem; min-height:1.2rem;">Add items to
                    your cart to continue.</div>
            </div>
        </div>
    </main>

    <script src="order.js"></script>
    <script>
        document.getElementById('mobileMenuToggle').addEventListener('click', function () {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('active');
        });

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function () {
                document.getElementById('navMenu').classList.remove('active');
            });
        });

        document.addEventListener('click', function (event) {
            const navMenu = document.getElementById('navMenu');
            const toggle = document.getElementById('mobileMenuToggle');
            if (!navMenu.contains(event.target) && !toggle.contains(event.target)) {
                navMenu.classList.remove('active');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
